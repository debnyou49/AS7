<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>Form Page</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            background: linear-gradient(to right, #667eea, #764ba2);
        }

        .card {
            border-radius: 20px;
        }

        .form-control, .form-select {
            border-radius: 10px;
        }

        .btn-custom {
            border-radius: 50px;
        }
    </style>
</head>

<body>
    <body>

        <div class="container d-flex justify-content-center align-items-center" style="min-height: 100vh;">
            <div class="col-md-5">
                <div class="card shadow-lg p-4 bg-white">
        
                    <h2 class="text-center text-primary mb-3">บันทึกข้อมูลพนักงาน</h2>
                    <p class="text-center text-muted">กรอกข้อมูล</p>
        
                    <form method="POST">
                        {% csrf_token %}
        
                        <div class="mb-3">
                            <label class="form-label">ชื่อ</label>
                            <input type="text" name="name" class="form-control" placeholder="กรอกชื่อของคุณ" required>
                        </div>
        
                        <div class="mb-3">
                            <label class="form-label">Email</label>
                            <input type="email" name="email" class="form-control" placeholder="example@email.com" required>
                        </div>
        
                        <div class="mb-3">
                            <label class="form-label">Position</label>
                            <select name="position" class="form-select" required>
                                <option value="">-- เลือกตำแหน่ง --</option>
                                <option value="Manager">Manager</option>
                                <option value="Developer">Developer</option>
                                <option value="Designer">Designer</option>
                            </select>
                        </div>
        
                        <div class="mb-3">
                            <label class="form-label">Phone Number</label>
                            <input type="text" name="phonenumber" class="form-control" placeholder="08xxxxxxxx" required>
                        </div>
        
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary btn-custom">
                                ส่งข้อมูล
                            </button>
                        </div>
        
                    </form>
        
                </div>
            </div>
        </div>
        
        </body>
        </html>
